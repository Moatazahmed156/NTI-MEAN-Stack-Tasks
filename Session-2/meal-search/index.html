<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Meal Search</h1>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Enter meal name..."
            >

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div id="result" class="meal-container">

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
